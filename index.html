<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft GUI - Jarvis OS Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">

    <style>
        :root {
            --mc-gui-bg: #c6c6c6;
            --mc-button-bg: #8b8b8b;
            --mc-button-hover: #70b0ff; /* Azul de selección de Minecraft */
            --shadow-color: rgba(0, 0, 0, 0.7);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'VT323', monospace;
            image-rendering: pixelated;
        }

        body, html {
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }

        /* Video de fondo con efecto de viñeta */
        .video-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -2;
        }

        .video-container video {
            width: 100%; height: 100%; object-fit: cover;
        }

        /* Efecto de viñeta para dar oscuridad a los bordes */
        .vignette {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 40%, rgba(0,0,0,0.8) 100%);
            z-index: -1;
        }

        .overlay {
            width: 100%; height: 100%;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
        }

        /* Logo y Splash Text */
        .logo-container {
            position: relative;
            margin-bottom: 50px;
        }

        .main-title {
            color: #fff;
            font-size: 5rem;
            text-shadow: 5px 5px 0px #3f3f3f;
            letter-spacing: 4px;
        }

        .splash-text {
            position: absolute;
            bottom: -20px; right: -40px;
            color: #ffff00;
            font-size: 1.8rem;
            text-shadow: 2px 2px 0px #3f3f00;
            transform: rotate(-20deg);
            animation: splashAnim 0.5s infinite alternate;
        }

        @keyframes splashAnim {
            from { transform: rotate(-20deg) scale(1); }
            to { transform: rotate(-20deg) scale(1.1); }
        }

        /* --- LA CAJA DE GUI --- */
        .login-card {
            /* Textura de piedra simulada con CSS */
            background: 
                linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)),
                repeating-conic-gradient(#4d4d4d 0% 25%, #313131 0% 50%) 
                50% / 4px 4px;
            
            border: 4px solid #000;
            box-shadow: inset 4px 4px 0px #8b8b8b, inset -4px -4px 0px #212121;
            padding: 40px;
            width: 380px;
            text-align: center;
        }

        .form-group {
            margin-bottom: 25px;
            text-align: left;
        }

        .form-group label {
            display: block;
            color: #e0e0e0;
            font-size: 1.5rem;
            margin-bottom: 8px;
            text-shadow: 2px 2px 0px #000;
        }

        /* Inputs auténticos */
        .form-group input {
            width: 100%;
            padding: 10px;
            background-color: #000;
            border: 2px solid #a0a0a0;
            color: #fff;
            font-size: 1.4rem;
            outline: none;
        }

        .form-group input:focus {
            border-color: #fff;
        }

        /* BOTÓN MINECRAFT MEJORADO */
        .btn-mc {
            width: 100%;
            padding: 12px;
            background-color: #6d6d6d;
            border: 3px solid #000;
            color: #e0e0e0;
            font-size: 1.5rem;
            text-transform: uppercase;
            cursor: pointer;
            position: relative;
            box-shadow: inset 3px 3px 0px #aaa, inset -3px -3px 0px #333;
        }

        .btn-mc:hover {
            background-color: #7da4ff; /* Azul cuando pasas el mouse */
            color: #fff;
            border-color: #fff;
            box-shadow: inset 3px 3px 0px #c6d9ff, inset -3px -3px 0px #3b5ba5;
        }

        .btn-mc:active {
            transform: scale(0.98);
        }

    </style>
</head>
<body>

    <div class="video-container">
        <video autoplay muted loop playsinline>
            <source src="fondo1.mp4" type="video/mp4">
        </video>
    </div>
    <div class="vignette"></div>

    <div class="overlay">
        <div class="logo-container">
            <h1 class="main-title">JARVIS OS</h1>
            <div class="splash-text" id="splash">¡Programando!</div>
        </div>

        <div class="login-card">
            <form id="loginForm">
                <div class="form-group">
                    <label>Nombre de Usuario</label>
                    <input type="text" placeholder="..." required autocomplete="off">
                </div>
                <div class="form-group">
                    <label>Contraseña</label>
                    <input type="password" placeholder="..." required>
                </div>
                <button type="submit" class="btn-mc" id="btnClick">Entrar al Mundo</button>
            </form>
        </div>
    </div>

    <script>
        // Mensajes aleatorios para el Splash Text
        const splashes = ["¡Hola jgnurniu!", "100% Real No Fake", "Usando TinyLlama", "Full Stack Kids", "Crafteando código"];
        document.getElementById('splash').innerText = splashes[Math.floor(Math.random() * splashes.length)];

        // Sonido de click auténtico (Sintetizado para no necesitar archivos externos)
        function playClickSound() {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();

            oscillator.type = 'square';
            oscillator.frequency.setValueAtTime(150, audioCtx.currentTime);
            oscillator.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.1);
            
            gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);

            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            oscillator.start();
            oscillator.stop(audioCtx.currentTime + 0.1);
        }

        document.getElementById('btnClick').addEventListener('mousedown', playClickSound);

        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            alert("Iniciando sesión en el servidor...");
        });
    </script>
</body>
</html>
