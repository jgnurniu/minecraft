<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login Educakids</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        /* Contenedor del video nativo */
        .video-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
            background-color: #000;
        }

        .video-container video {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Clave para que no se estire feo */
        }

        /* Overlay para oscurecer el video y que se lea el form */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Tarjeta de Login (Efecto Glassmorphism) */
        .login-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 2.5rem;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            width: 100%;
            max-width: 400px;
            color: white;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .login-card h2 {
            text-align: center;
            margin-bottom: 1.5rem;
            font-size: 2rem;
            letter-spacing: 1px;
        }

        .form-group {
            margin-bottom: 1.2rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 0.9rem;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            outline: none;
        }

        .form-group input::placeholder {
            color: #ccc;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #fff;
            color: #333;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s ease;
        }

        button:hover {
            background: #00d2ff;
            color: white;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="video-container">
        <!-- IMPORTANTE: Usa el video descargado aquí -->
        <video autoplay muted loop playsinline>
            <source src="WhatsApp Video 2026-05-01 at 15.46.32.mp4" type="video/mp4">
            Tu navegador no soporta videos.
        </video>
    </div>

    <div class="overlay">
        <div class="login-card">
            <h2>BIENVENIDO</h2>
            <form>
                <div class="form-group">
                    <label>Usuario</label>
                    <input type="text" placeholder="Ingresa tu usuario">
                </div>
                <div class="form-group">
                    <label>Contraseña</label>
                    <input type="password" placeholder="••••••••">
                </div>
                <button type="submit">INGRESAR</button>
            </form>
        </div>
    </div>

</body>
</html>
