<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JARVIS OS — Login</title>
    
    <!-- Fuente Pixelada de Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">

    <style>
        :root {
            --mc-gray-dark: #313131;
            --mc-gray-light: #c6c6c6;
            --mc-border-light: #ffffff;
            --mc-border-shadow: #000000;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'VT323', monospace;
            image-rendering: pixelated; /* Mantiene los bordes nítidos */
        }

        body, html {
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* --- CONTENEDOR DE VIDEO ROBUSTO --- */
        .video-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background-color: #111; /* Fondo de respaldo */
        }

        .video-wrapper video {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Asegura que cubra la pantalla sin deformarse */
        }

        /* Capa de viñeta y oscuridad para mejorar visibilidad */
        .vignette {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(circle, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.8) 100%);
        }

        /* --- INTERFAZ (GUI) --- */
        .container {
            text-align: center;
            z-index: 10;
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }

        .logo-area {
            position: relative;
            margin-bottom: 40px;
        }

        .title {
            font-size: 5.5rem;
            color: #fff;
            text-shadow: 6px 6px 0px #3f3f3f;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .splash {
            position: absolute;
            right: -20px;
            bottom: -15px;
            color: #ffff00;
            font-size: 1.8rem;
            text-shadow: 2px 2px 0px #3f3f00;
            transform: rotate(-20deg);
            animation: bounce 0.4s infinite alternate;
        }

        @keyframes bounce {
            from { transform: rotate(-20deg) scale(1); }
            to { transform: rotate(-20deg) scale(1.15); }
        }

        /* --- TARJETA DE LOGIN --- */
        .mc-card {
            background-color: var(--mc-gray-dark);
            /* Textura de píxeles simulada */
            background-image: repeating-conic-gradient(#4d4d4d 0% 25%, #313131 0% 50%);
            background-size: 4px 4px;
            
            border: 4px solid #000;
            box-shadow: inset 4px 4px 0px #555, inset -4px -4px 0px #1a1a1a;
            padding: 30px;
            color: #aaaaaa;
        }

        .field {
            margin-bottom: 20px;
            text-align: left;
        }

        .field label {
            display: block;
            font-size: 1.5rem;
            margin-bottom: 5px;
            color: #e0e0e0;
            text-shadow: 2px 2px 0px #000;
        }

        .field input {
            width: 100%;
            padding: 10px;
            background-color: #000;
            border: 2px solid #a0a0a0;
            color: #fff;
            font-size: 1.4rem;
            outline: none;
        }

        .field input:focus {
            border-color: #fff;
        }

        /* --- BOTÓN AUTÉNTICO --- */
        .mc-btn {
            width: 100%;
            padding: 12px;
            background-color: #6d6d6d;
            border: 4px solid #000;
            color: #e0e0e0;
            font-size: 1.6rem;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: inset 4px 4px 0px #aaa, inset -4px -4px 0px #333;
            transition: none; /* Los botones de MC no tienen transiciones suaves */
        }

        .mc-btn:hover {
            background-color: #7da4ff; /* Azul de selección Java Edition */
            color: #fff;
            border-color: #fff;
            box-shadow: inset 4px 4px 0px #c6d9ff, inset -4px -4px 0px #3b5ba5;
        }

        .mc-btn:active {
            box-shadow: inset 4px 4px 0px #1a1a1a, inset -4px -4px 0px #555;
            padding-top: 14px;
            padding-bottom: 10px;
        }

    </style>
</head>
<body>

    <!-- Fondo de Video -->
    <div class="video-wrapper">
        <video autoplay muted loop playsinline preload="auto">
            <source src="fondo1.mp4" type="video/mp4">
        </video>
    </div>
    
    <div class="vignette"></div>

    <div class="container">
        <div class="logo-area">
            <h1 class="title">JARVIS OS</h1>
            <div class="splash" id="splash">¡Crafteando!</div>
        </div>

        <div class="mc-card">
            <form id="loginForm">
                <div class="field">
                    <label>Nombre de Usuario</label>
                    <input type="text" required spellcheck="false" autocomplete="off">
                </div>
                <div class="field">
                    <label>Contraseña</label>
                    <input type="password" required>
                </div>
                <button type="submit" class="mc-btn" id="btnSound">Entrar al Mundo</button>
            </form>
        </div>
    </div>

    <script>
        // 1. Textos aleatorios del Splash
        const frases = ["¡Hola jgnurniu!", "100% Pixelado", "Cuidado con los Creepers", "Jarvis v8.0", "Python & Bloques"];
        document.getElementById('splash').innerText = frases[Math.floor(Math.random() * frases.length)];

        // 2. Generador de sonido "Pop" (Click de Minecraft)
        function playPop() {
            const context = new (window.AudioContext || window.webkitAudioContext)();
            const osc = context.createOscillator();
            const gain = context.createGain();

            osc.type = 'sine';
            osc.frequency.setValueAtTime(150, context.currentTime);
            osc.frequency.exponentialRampToValueAtTime(40, context.currentTime + 0.1);

            gain.gain.setValueAtTime(0.2, context.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, context.currentTime + 0.1);

            osc.connect(gain);
            gain.connect(context.destination);

            osc.start();
            osc.stop(context.currentTime + 0.1);
        }

        // Asignar sonido al botón
        document.getElementById('btnSound').addEventListener('mousedown', playPop);

        // 3. Manejo del formulario
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            // Aquí conectarías con tu backend PHP
            console.log("Validando credenciales...");
        });
    </script>
</body>
</html>
